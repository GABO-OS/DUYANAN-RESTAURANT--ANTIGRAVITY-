spring.application.name=backend

# ── MySQL Connection ──────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/duyanan_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────
# "update" = auto-create/alter tables to match your entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── CORS (allow frontend to call the backend) ─────────────
spring.web.cors.allowed-origins=http://localhost:5173

# ── JWT Configuration ─────────────────────────────────────
jwt.secret=DuyananRestaurantSuperSecretKeyForJWT2026!MustBe32+Chars
jwt.expiration=86400000
